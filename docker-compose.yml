services:
  autoscreen:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: autoscreen:cpu
    container_name: autoscreen
    working_dir: /workspace
    # Code and data are baked into the image (plug-and-play). Only campaign
    # outputs are mounted back to the host so results survive the container.
    volumes:
      - ./runs:/workspace/runs
      - ./results:/workspace/results
    stdin_open: true
    tty: true
    command: bash
