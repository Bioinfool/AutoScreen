name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e ".[robot,dev,prep]"
          python scripts/prep_fps_serial.py --name Enamine10k
      - name: Ruff (critical)
        run: ruff check autoscreen robot_mock tests scripts --select E9,F63,F7,F82
      - name: Pytest
        run: pytest -q --timeout=180 --cov=autoscreen --cov-report=term-missing:skip-covered
